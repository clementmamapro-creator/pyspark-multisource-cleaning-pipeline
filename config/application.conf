# =====================================================================
# application.conf
# Fichier de configuration du pipeline TP Multisource.
# Aucun mot de passe ici : les secrets viennent des variables
# d'environnement (POSTGRES_PASSWORD), lues dans src/extract.py.
# Format : sections [nom] + clé = valeur, parsé par configparser.
# =====================================================================

[spark]
app_name = MultiSourceDataCleaning
# En local pour les tests rapides : local[*]
# Sur le cluster Docker du projet : spark://spark-master:7077
master = spark://spark-master:7077

[postgres]
host = postgres-db
port = 5432
database = ecommerce
user = spark_user

[mongodb]
host = mongo-db
port = 27017
database = ecommerce
collection = reviews

[paths]
# Dossier contenant les fichiers JSON d'evenements de livraison
delivery_events_dir = /data/delivery_events
# Fichier CSV/JSON source unique (compat avec l'ancien dossier /data)
legacy_data_dir = /data
# Racine des sorties du pipeline
output_dir = /data/output
data_quality_report_dir = /data/output/data_quality_report
rejects_dir = /data/output/rejects
customer_order_360_dir = /data/output/customer_order_360

[taux_change]
# Taux de conversion vers l'euro (Etape 15). A remplacer par un appel
# a une API de change en production.
EUR = 1.0
USD = 0.92
GBP = 1.17
MAD = 0.091
